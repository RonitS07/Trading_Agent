<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradePilot - Next-Gen Indian Trading Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

</head>

<body class="pro-theme">

    <!-- DESKTOP VIEW WRAPPERS -->
    <header class="top-header desktop-only">
        <!-- ... (Keep content) ... -->
    </header>

    <div class="portfolio-bar desktop-only">
        <!-- ... (Keep content) ... -->
    </div>

    <div class="main-layout desktop-only">
        <!-- ... (Keep content) ... -->
    </div>

    <!-- MOBILE VIEW (NEW) -->
    <div class="mobile-layout mobile-only">
        <header class="mobile-header">
            <div class="m-brand">TRADE<span class="accent-text" style="color: var(--accent-cyan);">PILOT</span></div>
            <div class="m-market-badge">LIVE</div>
        </header>

        <main class="mobile-content">
            <!-- 1. OVERVIEW -->
            <section id="m-overview" class="m-view active">
                <div class="m-portfolio-card">
                    <div class="m-port-label">TOTAL BALANCE</div>
                    <div id="m-port-total" class="m-port-val">₹1,00,000</div>
                    <div class="m-port-row">
                        <span id="m-port-pnl" class="m-pnl-tag">+0%</span>
                        <span class="m-port-growth">Invested: <span id="m-port-invested">₹0</span></span>
                    </div>
                </div>

                <div class="m-search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="m-search-input" placeholder="Search Equity..." autocomplete="off">
                </div>

                <div class="m-section-title">WATCHLIST</div>
                <div id="m-watchlist-chips" class="m-watchlist-scroll">
                    <!-- JS Injected Chips -->
                    <div class="m-chip-placeholder">Search to add stocks...</div>
                </div>

                <div class="m-section-title">RECENT ACTIVITY</div>
                <div id="m-activity-log" class="m-activity-list"></div>
            </section>

            <!-- 2. ANALYSIS -->
            <section id="m-analysis" class="m-view">
                <div class="m-stock-card">
                    <div class="m-stock-header">
                        <h2 id="m-symbol">--</h2>
                        <button id="m-btn-star" class="m-btn-icon"><i class="fa-regular fa-star"></i></button>
                    </div>
                    <div class="m-price-row">
                        <span id="m-price">₹0.00</span>
                        <span id="m-change" class="change-tag">0.00%</span>
                    </div>
                </div>

                <div class="m-chart-container">
                    <!-- Reusing SVG structure but styled for mobile -->
                    <svg id="m-stock-svg" viewBox="0 0 350 150" preserveAspectRatio="none">
                        <path id="m-stock-path" d="" fill="none" stroke="var(--accent-cyan)" stroke-width="2" />
                    </svg>
                </div>

                <div class="m-action-grid">
                    <button id="m-btn-buy" class="m-action-btn buy">BUY</button>
                    <button id="m-btn-sell" class="m-action-btn sell">SELL</button>
                </div>
            </section>

            <!-- 3. PLANNER -->
            <section id="m-planner" class="m-view">
                <div class="m-ai-card">
                    <div class="m-ai-header"><i class="fa-solid fa-robot"></i> AI STRATEGIST</div>
                    <div id="m-ai-response" class="m-ai-body">
                        Select a stock in Analysis to get a strategy.
                    </div>
                </div>
                <button id="m-btn-plan" class="m-full-btn">GENERATE INSIGHT</button>
            </section>
        </main>

        <nav class="mobile-bottom-nav">
            <button class="m-nav-item active" data-target="m-overview">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </button>
            <button class="m-nav-item" data-target="m-analysis">
                <i class="fa-solid fa-chart-line"></i>
                <span>Trade</span>
            </button>
            <button class="m-nav-item" data-target="m-planner">
                <i class="fa-solid fa-bolt"></i>
                <span>AI</span>
            </button>
        </nav>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Security Modal -->
    <div id="security-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3><i class="fa-solid fa-shield-halved"></i> Security Verification</h3>
            <p>Enter your 4-digit PIN to authorize this transaction.</p>
            <div class="pin-input-group">
                <input type="password" id="security-pin" placeholder="••••" maxlength="4">
            </div>
            <div class="modal-actions">
                <button id="btn-security-cancel" class="btn-cancel">Cancel</button>
                <button id="btn-security-confirm" class="btn-confirm">Confirm Trade</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=3"></script>

    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>

</html>
